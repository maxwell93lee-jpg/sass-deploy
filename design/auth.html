<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }
        .text-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);

<body class="bg-surface text-on-surface antialiased overflow-hidden">
<main class="flex min-h-screen">
<!-- Left Side: Service Intro -->
<section class="hidden lg:flex lg:w-1/2 relative flex-col justify-between p-16 overflow-hidden bg-primary">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-full">
<div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary-container opacity-40 blur-[120px]"></div>
<div class="absolute bottom-0 right-0 w-full h-full opacity-20 pointer-events-none" data-alt="abstract blue background with subtle grid of dots and soft glowing atmospheric light effects" style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 40px 40px;"></div>
</div>
<div class="relative z-10">
<div class="flex items-center gap-3 mb-24">
<div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="cloud">cloud</span>
</div>
<span class="text-2xl font-extrabold text-white tracking-tighter font-headline">CloudNote</span>
</div>
<div class="max-w-md">
<h1 class="text-5xl font-bold text-white leading-tight tracking-tight mb-8 font-headline">
                        생각을 정리하는<br/>새로운 방법
                    </h1>
<p class="text-on-primary-container text-lg leading-relaxed opacity-90 font-body">
                        CloudNote는 당신의 아이디어가 숨 쉴 수 있는 디지털 안식처입니다. 
                        더 깊이 생각하고, 더 명확하게 기록하세요.
                    </p>
</div>
</div>
<div class="relative z-10 mt-auto">
<div class="glass-panel p-8 rounded-2xl max-w-sm">
<div class="flex -space-x-3 mb-4">

<img alt="사용자 3" class="w-10 h-10 rounded-full border-2 border-white object-cover" data-alt="lifestyle headshot of a student focused and happy in a bright library" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2BdvY_ketp9hDEVhavlQ-MpWjXaOKqhCcx1CeH2jF_q2T_FLFykbVITm0OsueY7GVqZVnyO9Re6Zv_A-HjgjDOMphzUsG-P6dWO3m4HpMBCGd2upxq9u7VR1a9aDxIZmS_beUKHjMhaLnu1RK6W4qdDPj2bLHz-y0Gly-SEGYW6gpfgbbZhavRTsX0-_8w4apKhGbGtn_w71YmoyXDJl0ylapwaeH7F18c3sIUNDYlY1q284mEphlq_lt6th_3Yxb33eiAy9Qw7on"/>
<div class="w-10 h-10 rounded-full border-2 border-white bg-secondary-container flex items-center justify-center text-xs font-bold text-on-secondary-container">
                            +10k
                        </div>
</div>
<p class="text-white font-medium text-sm leading-snug">
                        10만 명의 사용자가 선택한 지능형 노트 테이킹 플랫폼
                    </p>
</div>
</div>
</section>
<!-- Right Side: Auth Forms -->
<section class="w-full lg:w-1/2 flex items-center justify-center bg-surface p-6 sm:p-12">
<div class="w-full max-w-md">
<!-- Mobile Header -->
<div class="lg:hidden flex items-center gap-2 mb-12">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" data-icon="cloud">cloud</span>
</div>
<span class="text-xl font-extrabold text-on-surface tracking-tighter font-headline">CloudNote</span>
</div>
<!-- Tabs -->
<div class="flex gap-8 mb-10 border-b border-surface-container">
<button class="pb-4 text-lg font-semibold auth-tab-active transition-all" id="tab-login">로그인</button>
<button class="pb-4 text-lg font-medium text-outline transition-all hover:text-on-surface-variant" id="tab-register">회원가입</button>
</div>
<!-- Login Form Container -->
<div class="block" id="login-container">
<h2 class="text-2xl font-bold text-on-surface mb-2 font-headline">환영합니다!</h2>
<p class="text-on-surface-variant mb-8 text-sm">계정에 로그인하여 노트를 계속 작성하세요.</p>
<form class="space-y-5">
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase ml-1" for="email">이메일 주소</label>
<input class="w-full px-4 py-3.5 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:bg-primary/5 transition-all outline-none" id="email" placeholder="example@cloudnote.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase" for="password">비밀번호</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">비밀번호를 잊으셨나요?</a>
</div>
<input class="w-full px-4 py-3.5 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:bg-primary/5 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center px-1">
<input class="w-4 h-4 text-primary bg-surface-container-lowest border-outline-variant rounded focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-on-surface-variant" for="remember">로그인 상태 유지</label>
</div>
<button class="w-full py-4 bg-gradient-to-tr from-primary to-primary-container text-white font-bold rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all" type="submit">
                            로그인
                        </button>
</form>
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container-high"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-4 bg-surface text-outline font-medium">또는 소셜 계정으로 로그인</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-lowest border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors active:scale-95">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqhm0UHbGFsumFE4WWU5F4ULph-I12z1HicJbkmBcWv1DOKXS4zpa-iMM3C_KIpLoAtpnJDX5r1xvYbsnLA85obTTcTrNqnFNk9VkuHK56sZlkY-0dGKztd30CswUj5wDkphlyXdy5tg6bYwfdQA0WWV3ZQWbRBamguqmEyCGsJkk55en2Z3HH7UGP18IQbr_sAe9XKP_BGb6FyZx59RtDBVccZ3MNio5kmOppPOtdMepvRNQx3B6yl978BX0YRP-kO65dzPpKmn1h"/>
<span class="text-sm font-semibold text-on-surface-variant">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-[#FEE500] rounded-xl hover:opacity-90 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-black text-xl" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="text-sm font-semibold text-black">카카오톡</span>
</button>
</div>
</div>
<!-- Register Form Container (Hidden by default in static view, logic placeholder) -->
<div class="hidden" id="register-container">
<h2 class="text-2xl font-bold text-on-surface mb-2 font-headline">계정 만들기</h2>
<p class="text-on-surface-variant mb-8 text-sm">CloudNote와 함께 지적 생산성을 높여보세요.</p>
<form class="space-y-5">
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase ml-1" for="reg-email">이메일 주소</label>
<input class="w-full px-4 py-3.5 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:bg-primary/5 transition-all outline-none" id="reg-email" placeholder="example@cloudnote.com" type="email"/>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase ml-1" for="reg-password">비밀번호</label>
<input class="w-full px-4 py-3.5 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:bg-primary/5 transition-all outline-none" id="reg-password" placeholder="8자 이상의 비밀번호" type="password"/>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase ml-1" for="reg-confirm">비밀번호 확인</label>
<input class="w-full px-4 py-3.5 rounded-xl bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:bg-primary/5 transition-all outline-none" id="reg-confirm" placeholder="비밀번호 다시 입력" type="password"/>
</div>
<div class="flex items-start px-1 mt-6">
<input class="mt-1 w-4 h-4 text-primary bg-surface-container-lowest border-outline-variant rounded focus:ring-primary" id="terms" type="checkbox"/>
<label class="ml-2 text-sm text-on-surface-variant leading-tight" for="terms">
<span class="text-primary underline cursor-pointer">이용약관</span> 및 <span class="text-primary underline cursor-pointer">개인정보처리방침</span>에 동의합니다.
                            </label>
</div>
<button class="w-full py-4 bg-gradient-to-tr from-primary to-primary-container text-white font-bold rounded-xl shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all" type="submit">
                            회원가입 완료
                        </button>
</form>
</div>
<!-- Footer Links (Transactional Page specific) -->
<footer class="mt-12 text-center">
<p class="text-xs text-outline">
                        © 2024 CloudNote. 모든 권리 보유.
                    </p>
</footer>
</div>
</section>
</main>
